<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Muthusee Chat Viewer</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        background: #000;
        color: #fff;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      /* ── TOPBAR ── */
      .topbar {
        background: #000;
        border-bottom: 0.5px solid #1c1c1c;
        padding: 12px 16px 0;
        position: sticky;
        top: 0;
        z-index: 100;
        flex-shrink: 0;
      }

      .topbar h1 {
        font-size: 16px;
        font-weight: 600;
        color: #fff;
        letter-spacing: -0.2px;
        margin-bottom: 10px;
      }

      /* ── FILTERS ── */
      .filters {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }

      input[type="date"],
      input[type="text"] {
        background: #1a1a1a;
        color: #fff;
        border: none;
        border-radius: 22px;
        padding: 9px 14px;
        font-size: 13px;
        outline: none;
        transition: background 0.15s;
        -webkit-appearance: none;
      }

      input[type="date"]:focus,
      input[type="text"]:focus {
        background: #222;
      }

      input[type="date"]::-webkit-calendar-picker-indicator {
        filter: invert(1);
        opacity: 0.4;
        cursor: pointer;
      }

      input::placeholder {
        color: #555;
      }

      .searchBox {
        flex: 1;
        min-width: 160px;
      }

      button {
        background: #0095f6;
        color: #fff;
        border: none;
        border-radius: 22px;
        padding: 9px 20px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 700;
        transition: background 0.15s;
        -webkit-appearance: none;
      }

      button:hover {
        background: #1aa3ff;
      }

      /* Reset button */
      button.btn-reset {
        background: #1a1a1a;
        font-weight: 500;
      }

      button.btn-reset:hover {
        background: #2a2a2a;
      }

      /* Logout button */
      button.btn-logout {
        background: #1a1a1a;
        font-size: 16px;
        padding: 7px 12px;
        font-weight: 400;
        flex-shrink: 0;
      }

      button.btn-logout:hover {
        background: #2a2a2a;
        color: #ed4956;
      }

      /* ── INFO BAR ── */
      .info {
        font-size: 12px;
        color: #555;
        padding: 8px 2px 10px;
        min-height: 30px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      /* ── PROGRESS BAR ── */
      .progress-wrap {
        flex: 1;
        height: 2px;
        background: #1a1a1a;
        border-radius: 2px;
        overflow: hidden;
        display: none;
      }

      .progress-wrap.visible {
        display: block;
      }

      .progress-bar {
        height: 100%;
        background: #0095f6;
        width: 0%;
        transition: width 0.1s linear;
        border-radius: 2px;
      }

      /* ── CHAT CONTAINER ── */
      .chat-container {
        flex: 1;
        overflow-y: auto;
        padding: 8px 16px 20px;
        display: flex;
        flex-direction: column;
        gap: 2px;
        background: #000;
      }

      .chat-container::-webkit-scrollbar {
        width: 8px;
      }

      .chat-container::-webkit-scrollbar-track {
        background: transparent;
      }

      .chat-container::-webkit-scrollbar-thumb {
        background: #2a2a2a;
        border-radius: 10px;
      }

      /* ── DATE SEPARATOR ── */
      .date-separator {
        text-align: center;
        color: #555;
        font-size: 12px;
        font-weight: 500;
        margin: 18px 0 10px;
        letter-spacing: 0.01em;
      }

      /* ── MESSAGE ROW ── */
      .message-row {
        display: flex;
        width: 100%;
        margin: 1px 0;
      }

      .me {
        justify-content: flex-end;
      }

      .other {
        justify-content: flex-start;
      }

      /* ── BUBBLE ── */
      .bubble {
        max-width: 68%;
        padding: 10px 14px;
        border-radius: 22px;
        line-height: 1.45;
        word-wrap: break-word;
        font-size: 14.5px;
        overflow: visible;
      }

      .me .bubble {
        background: #3797f0;
        color: #fff;
        border-bottom-right-radius: 5px;
      }

      .other .bubble {
        background: #262626;
        color: #fff;
        border-bottom-left-radius: 5px;
      }

      /* ── META (TIME) ── */
      .meta {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.4);
        margin-top: 5px;
        text-align: right;
        padding: 0 2px;
      }

      .other .bubble .meta {
        text-align: left;
      }

      /* ── REPLY ── */
      .reply {
        background: rgba(255, 255, 255, 0.08);
        padding: 7px 10px;
        border-left: 2.5px solid rgba(255, 255, 255, 0.35);
        border-radius: 10px;
        margin-bottom: 8px;
        font-size: 12.5px;
        color: rgba(255, 255, 255, 0.75);
        opacity: 1;
      }

      .reply strong {
        display: block;
        font-size: 11px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.5);
        margin-bottom: 2px;
      }

      /* ── MEDIA ── */
      .media {
        background: rgba(255, 255, 255, 0.07);
        border-radius: 16px;
        padding: 18px 16px;
        text-align: center;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.6);
        min-width: 150px;
        margin-top: 0;
      }

      .media small {
        display: block;
        margin-top: 6px;
        font-size: 12px;
        opacity: 0.6;
        line-height: 1.4;
      }

      /* ── VOICE MESSAGE ── */
      .voice-message {
        display: flex;
        flex-direction: column;
        gap: 8px;
        min-width: 240px;
        max-width: 280px;
      }

      .voice-header {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        font-weight: 600;
        opacity: 0.9;
      }

      .voice-duration {
        font-size: 11px;
        opacity: 0.45;
        letter-spacing: 0.3px;
      }

      .audio-player {
        display: flex;
        align-items: center;
        gap: 10px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 50px;
        padding: 8px 14px;
      }

      .audio-play-btn {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.233) !important;
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border: 1px solid rgba(255, 255, 255, 0.301);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        padding: 0;
        transition:
          background 0.15s,
          transform 0.1s;
      }

      .audio-play-btn:hover {
        background: rgba(255, 255, 255, 0.14) !important;
        transform: scale(1.05);
      }

      .audio-play-btn svg {
        width: 13px;
        height: 13px;
        fill: #fff;
        margin-left: 2px;
      }

      .audio-play-btn.playing svg.icon-play {
        display: none;
      }
      .audio-play-btn:not(.playing) svg.icon-pause {
        display: none;
      }

      .audio-waveform {
        flex: 1;
        display: flex;
        align-items: center;
        gap: 2.5px;
        height: 28px;
        cursor: pointer;
      }

      .audio-bar {
        flex: 1;
        border-radius: 2px;
        background: rgba(255, 255, 255, 0.35);
        transition: background 0.1s;
        min-width: 2px;
      }

      .audio-bar.played {
        background: rgba(255, 255, 255, 0.9);
      }

      .audio-time {
        font-size: 11px;
        font-weight: 500;
        opacity: 0.6;
        min-width: 32px;
        text-align: right;
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.2px;
      }

      audio {
        display: none;
      }

      /* ── IMAGES ── */
      img {
        display: block;
      }

      .chat-image {
        width: 100%;
        max-width: 260px;
        border-radius: 18px;
        margin-top: 0;
        cursor: pointer;
      }

      .sticker {
        width: 110px;
        margin-top: 0;
      }

      /* ── REACTIONS ── */
      .reactions {
        display: flex;
        gap: 4px;
        margin-top: 6px;
        flex-wrap: wrap;
      }

      .reaction {
        background: #1e1e1e;
        border: 0.5px solid #333;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 13px;
        cursor: pointer;
      }

      /* ── RESPONSIVE ── */
      @media (max-width: 600px) {
        .topbar {
          padding: 10px 12px 0;
        }
        .bubble {
          max-width: 82%;
          font-size: 14px;
        }
        .chat-container {
          padding: 8px 10px 16px;
        }
        .filters {
          gap: 6px;
        }
        input[type="date"] {
          width: 130px;
          font-size: 12px;
          padding: 8px 10px;
        }
      }

      /* ── LOADER ── */
      #loader {
        position: fixed;
        inset: 0;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 999999;
        gap: 24px;
        transition: opacity 0.3s ease;
      }

      .loader-logo {
        font-size: 32px;
        font-weight: 700;
        background: linear-gradient(
          45deg,
          #feda75,
          #fa7e1e,
          #d62976,
          #962fbf,
          #4f5bd5
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: -1px;
      }

      .loader-status {
        font-size: 13px;
        color: #444;
        letter-spacing: 0.2px;
      }

      .loader-spinner {
        width: 42px;
        height: 42px;
        border: 3px solid #222;
        border-top: 3px solid #fff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 400px) {
        input[type="date"] {
          display: none;
        }
        .bubble {
          max-width: 88%;
        }
      }

      /* ── REEL CARD ── */
      .reel-card {
        display: flex;
        flex-direction: column;
        gap: 10px;
        min-width: 220px;
      }

      .reel-caption {
        font-size: 12.5px;
        color: rgba(255, 255, 255, 0.6);
        font-style: italic;
        line-height: 1.4;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .reel-owner {
        font-size: 11.5px;
        color: rgba(255, 255, 255, 0.45);
        margin-bottom: 2px;
      }

      .reel-find-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: rgba(255, 255, 255, 0.12);
        border: none;
        border-radius: 20px;
        padding: 7px 14px;
        color: #fff;
        font-size: 12.5px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
        align-self: flex-start;
      }

      .reel-find-btn:hover {
        background: rgba(255, 255, 255, 0.2);
      }

      .reel-find-btn:disabled {
        opacity: 0.5;
        cursor: default;
      }

      .reel-result {
        display: flex;
        flex-direction: column;
        gap: 8px;
        animation: fadeIn 0.25s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }

      .reel-result-link {
        display: flex;
        align-items: center;
        gap: 10px;
        background: rgba(255, 255, 255, 0.07);
        border-radius: 14px;
        padding: 10px 12px;
        text-decoration: none;
        color: #fff;
        transition: background 0.15s;
      }

      .reel-result-link:hover {
        background: rgba(255, 255, 255, 0.13);
      }

      .reel-result-thumb {
        width: 42px;
        height: 42px;
        border-radius: 10px;
        object-fit: cover;
        flex-shrink: 0;
        background: #1a1a1a;
      }

      .reel-result-info {
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 0;
      }

      .reel-result-title {
        font-size: 12.5px;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .reel-result-url {
        font-size: 11px;
        color: #0095f6;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .reel-result-snippet {
        font-size: 11.5px;
        color: rgba(255, 255, 255, 0.5);
        line-height: 1.4;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .reel-not-found {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.4);
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <h1>Muthusee Chat Viewer</h1>
      <div class="filters">
        <input type="date" id="startDate" />
        <input type="date" id="endDate" />
        <input
          type="text"
          id="searchInput"
          class="searchBox"
          placeholder="Search messages..."
        />
        <button onclick="applyFilters()">Apply</button>
        <button class="btn-reset" onclick="resetFilters()">Reset</button>
        <button class="btn-logout" onclick="doLogout()" title="Sign out">
          ↩
        </button>
      </div>
      <div class="info" id="info">
        <span id="infoText"></span>
        <div class="progress-wrap" id="progressWrap">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>
    </div>

    <div class="chat-container" id="chatContainer"></div>

    <div id="loader">
      <div class="loader-logo">Muthusee</div>
      <div class="loader-spinner"></div>
      <div class="loader-status" id="loaderStatus">Loading messages…</div>
    </div>

    <script>
      /* ═══════════════════════════════════════════
         AUTH GUARD — runs before anything else
         Redirects to login if session is missing,
         expired (3 days inactive), or password changed.
      ═══════════════════════════════════════════ */
      const SESSION_KEY = "muthusee_session";
      const LOGIN_PAGE = "login.html";
      const USERS_URL = "users.json";
      const INACTIVE_DAYS = 3;

      function getSession() {
        try {
          return JSON.parse(localStorage.getItem(SESSION_KEY));
        } catch {
          return null;
        }
      }

      function logout(reason) {
        localStorage.removeItem(SESSION_KEY);
        window.location.replace(
          LOGIN_PAGE + (reason ? "?reason=" + reason : ""),
        );
      }

      function simpleHash(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
          hash = (hash << 5) - hash + str.charCodeAt(i);
          hash |= 0;
        }
        return hash.toString(36);
      }

      function touchSession() {
        const session = getSession();
        if (session) {
          session.lastActive = Date.now();
          localStorage.setItem(SESSION_KEY, JSON.stringify(session));
        }
      }

      // ── Guard check on load ──
      (function authGuard() {
        const session = getSession();

        if (!session || !session.username) {
          logout("unauth");
          throw new Error("Not authenticated");
        }

        // Check inactivity (3 days)
        const inactiveSince = Date.now() - (session.lastActive || 0);
        const maxInactive = INACTIVE_DAYS * 24 * 60 * 60 * 1000;
        if (inactiveSince > maxInactive) {
          logout("inactive");
          throw new Error("Session expired");
        }

        // Check password change by comparing stored hash against users.json
        // We do this async — doesn't block page load, just logs out silently if changed
        fetch(USERS_URL + "?_=" + Date.now())
          .then((r) => r.json())
          .then((data) => {
            const users = data.users || [];
            const user = users.find(
              (u) =>
                u.username.toLowerCase() === session.username.toLowerCase(),
            );
            if (!user) {
              logout("unauth");
              return;
            }
            if (simpleHash(user.password) !== session.pwHash) {
              logout("pwchange");
            }
          })
          .catch(() => {}); // silently ignore fetch errors (offline etc)

        // Refresh lastActive on any user interaction
        ["click", "keydown", "scroll", "touchstart"].forEach((evt) => {
          document.addEventListener(evt, touchSession, { passive: true });
        });

        // Touch on load
        touchSession();
      })();

      /* ── Logout button helper (call from UI if needed) ── */
      function doLogout() {
        logout("");
      }

      let allMessages = [];

      /* ─────────────────────────────────────────
         LOAD
      ───────────────────────────────────────── */
      async function loadChat() {
        const loader = document.getElementById("loader");
        const loaderStatus = document.getElementById("loaderStatus");

        try {
          loaderStatus.textContent = "Fetching data…";
          const response = await fetch(
            "https://ik.imagekit.io/shadick/messages_minified.json",
          );
          loaderStatus.textContent = "Parsing messages…";
          const data = await response.json();
          allMessages = data.messages;

          // Hide loader, then render in background
          loader.style.opacity = "0";
          setTimeout(() => {
            loader.style.display = "none";
          }, 300);

          updateInfoText(allMessages.length, allMessages.length, "");
          await renderChunked(allMessages, true);
        } catch (err) {
          console.error(err);
          document.getElementById("chatContainer").innerHTML =
            `<div class="media">Failed to load chat.<br><small>${err.message}</small></div>`;
          loader.style.display = "none";
        }
      }

      /* ─────────────────────────────────────────
         CHUNKED RENDER  ← the key fix
         Renders CHUNK_SIZE messages per animation
         frame so the browser never freezes.
      ───────────────────────────────────────── */
      const CHUNK_SIZE = 60;

      function renderChunked(messages, scrollToBottom = false) {
        return new Promise((resolve) => {
          const container = document.getElementById("chatContainer");
          const progressWrap = document.getElementById("progressWrap");
          const progressBar = document.getElementById("progressBar");

          container.innerHTML = "";
          progressWrap.classList.add("visible");
          progressBar.style.width = "0%";

          const total = messages.length;
          let index = 0;
          let lastDate = "";

          if (total === 0) {
            progressWrap.classList.remove("visible");
            resolve();
            return;
          }

          function processChunk() {
            // Use a DocumentFragment — one DOM insertion per chunk
            const frag = document.createDocumentFragment();
            const end = Math.min(index + CHUNK_SIZE, total);

            for (; index < end; index++) {
              const msg = messages[index];
              const currentDate = formatDate(msg.timestampUnix * 1000);

              if (currentDate !== lastDate) {
                const sep = document.createElement("div");
                sep.className = "date-separator";
                sep.textContent = currentDate;
                frag.appendChild(sep);
                lastDate = currentDate;
              }

              frag.appendChild(buildMessageRow(msg));
            }

            container.appendChild(frag);

            // Update progress bar
            const pct = Math.round((index / total) * 100);
            progressBar.style.width = pct + "%";

            if (index < total) {
              // Yield to browser, continue next frame
              requestAnimationFrame(processChunk);
            } else {
              // Done
              progressWrap.classList.remove("visible");
              if (scrollToBottom) container.scrollTop = container.scrollHeight;
              resolve();
            }
          }

          requestAnimationFrame(processChunk);
        });
      }

      /* ─────────────────────────────────────────
         BUILD A SINGLE MESSAGE ROW (DOM, no innerHTML loops)
      ───────────────────────────────────────── */
      function buildMessageRow(msg) {
        const row = document.createElement("div");
        row.className = `message-row ${msg.sender === "me" ? "me" : "other"}`;

        const bubble = document.createElement("div");
        bubble.className = "bubble";

        // REPLY
        if (msg.replyTo) {
          const reply = document.createElement("div");
          reply.className = "reply";
          const strong = document.createElement("strong");
          strong.textContent = msg.replyTo.sender;
          reply.appendChild(strong);
          reply.appendChild(document.createTextNode(msg.replyTo.text || ""));
          bubble.appendChild(reply);
        }

        // CONTENT
        const content = buildContent(msg);
        bubble.appendChild(content);

        // REACTIONS
        if (msg.reactions && msg.reactions.length) {
          const reactions = document.createElement("div");
          reactions.className = "reactions";
          msg.reactions.forEach((r) => {
            const span = document.createElement("span");
            span.className = "reaction";
            span.textContent = r.emoji;
            reactions.appendChild(span);
          });
          bubble.appendChild(reactions);
        }

        // TIME
        const meta = document.createElement("div");
        meta.className = "meta";
        meta.textContent = formatTime(msg.timestampUnix * 1000);
        bubble.appendChild(meta);

        row.appendChild(bubble);
        return row;
      }

      /* ─────────────────────────────────────────
         BUILD CONTENT BY TYPE
      ───────────────────────────────────────── */
      function buildContent(msg) {
        const div = document.createElement("div");

        if (msg.type === "text") {
          const p = document.createElement("div");
          p.textContent = msg.text || "";
          div.appendChild(p);
        } else if (msg.type === "media") {
          if (msg.mediaUrl) {
            const img = document.createElement("img");
            img.src = msg.mediaUrl;
            img.className = "chat-image";
            img.loading = "lazy";
            img.onclick = () => window.open(msg.mediaUrl, "_blank");
            img.onerror = () => {
              const fb = document.createElement("div");
              fb.className = "media";
              fb.textContent = "📷 Image expired";
              img.replaceWith(fb);
            };
            div.appendChild(img);
          } else {
            div.appendChild(makeMedia("📷 Photo"));
          }
        } else if (msg.type === "sticker") {
          if (msg.mediaUrl) {
            const img = document.createElement("img");
            img.src = msg.mediaUrl;
            img.className = "sticker";
            img.loading = "lazy";
            img.onerror = () => {
              const fb = document.createElement("div");
              fb.className = "media";
              fb.textContent = "😊 Sticker";
              img.replaceWith(fb);
            };
            div.appendChild(img);
          } else {
            div.appendChild(makeMedia("😊 Sticker"));
          }
        } else if (msg.type === "reel_share") {
          div.appendChild(
            buildReelCard({
              icon: "🎬",
              label: "Reel Shared",
              caption: msg.reelCaption || msg.text || "",
              owner: msg.reelOwner || "",
            }),
          );
        } else if (msg.type === "clip") {
          div.appendChild(
            buildReelCard({
              icon: "🎥",
              label: "Clip Shared",
              caption: msg.clipCaption || msg.text || "",
              owner: "",
            }),
          );
        } else if (msg.type === "voice_media") {
          div.appendChild(buildVoicePlayer(msg));
        } else if (msg.type === "video_call_event") {
          const desc =
            msg.rawData?.video_call_event?.description || "Call Event";
          div.appendChild(makeMedia("📞 " + desc));
        } else {
          div.appendChild(makeMedia(msg.text || msg.type));
        }

        return div;
      }

      /* ─────────────────────────────────────────
         VOICE PLAYER
      ───────────────────────────────────────── */
      function buildVoicePlayer(msg) {
        const uid = "vm_" + Math.random().toString(36).slice(2, 8);
        const match = (msg.text || "").match(/\((.*?)\)/);
        const dur = match ? match[1] : "";

        const wrapper = document.createElement("div");
        wrapper.className = "voice-message";

        const header = document.createElement("div");
        header.className = "voice-header";
        header.textContent = "🎤 Voice message";
        wrapper.appendChild(header);

        if (msg.mediaUrl) {
          const player = document.createElement("div");
          player.className = "audio-player";
          player.id = "player_" + uid;

          // Play button
          const btn = document.createElement("button");
          btn.className = "audio-play-btn";
          btn.id = "btn_" + uid;
          btn.setAttribute("aria-label", "Play");
          btn.innerHTML = `
            <svg class="icon-play" viewBox="0 0 10 12"><path d="M0 0l10 6-10 6z"/></svg>
            <svg class="icon-pause" viewBox="0 0 10 12">
              <rect x="0" y="0" width="3.5" height="12"/>
              <rect x="6.5" y="0" width="3.5" height="12"/>
            </svg>`;
          player.appendChild(btn);

          // Waveform
          const wave = document.createElement("div");
          wave.className = "audio-waveform";
          wave.id = "wave_" + uid;
          const barsEls = [];
          for (let i = 0; i < 28; i++) {
            const bar = document.createElement("div");
            bar.className = "audio-bar";
            const h = 20 + Math.round(Math.abs(Math.sin(i * 0.7 + 1.2) * 55));
            bar.style.height = h + "%";
            bar.dataset.bar = i;
            wave.appendChild(bar);
            barsEls.push(bar);
          }
          player.appendChild(wave);

          // Time display
          const timeEl = document.createElement("span");
          timeEl.className = "audio-time";
          timeEl.textContent = "0:00";
          player.appendChild(timeEl);

          // Audio element
          const aud = document.createElement("audio");
          aud.preload = "metadata";
          const src = document.createElement("source");
          src.src = msg.mediaUrl;
          src.type = "audio/mp4";
          aud.appendChild(src);
          player.appendChild(aud);

          wrapper.appendChild(player);

          // Wire up events
          const fmt = (s) => {
            const m = Math.floor(s / 60),
              sec = Math.floor(s % 60);
            return `${m}:${sec.toString().padStart(2, "0")}`;
          };

          btn.addEventListener("click", () => {
            aud.paused ? aud.play() : aud.pause();
          });
          aud.addEventListener("play", () => btn.classList.add("playing"));
          aud.addEventListener("pause", () => btn.classList.remove("playing"));
          aud.addEventListener("ended", () => {
            btn.classList.remove("playing");
            barsEls.forEach((b) => b.classList.remove("played"));
            timeEl.textContent = "0:00";
          });
          aud.addEventListener("timeupdate", () => {
            const pct = aud.duration ? aud.currentTime / aud.duration : 0;
            const filled = Math.round(pct * barsEls.length);
            barsEls.forEach((b, i) => b.classList.toggle("played", i < filled));
            timeEl.textContent = fmt(aud.currentTime);
          });
          wave.addEventListener("click", (e) => {
            const rect = wave.getBoundingClientRect();
            const pct = (e.clientX - rect.left) / rect.width;
            if (aud.duration) aud.currentTime = pct * aud.duration;
          });
        } else {
          wrapper.appendChild(makeMedia("🎤 Voice message"));
        }

        if (dur) {
          const durEl = document.createElement("div");
          durEl.className = "voice-duration";
          durEl.textContent = dur;
          wrapper.appendChild(durEl);
        }

        return wrapper;
      }

      /* ─────────────────────────────────────────
         HELPERS
      ───────────────────────────────────────── */
      function makeMedia(text) {
        const div = document.createElement("div");
        div.className = "media";
        div.textContent = text;
        return div;
      }

      function formatDate(ts) {
        return new Date(ts).toLocaleDateString(undefined, {
          weekday: "long",
          year: "numeric",
          month: "long",
          day: "numeric",
        });
      }

      function formatTime(ts) {
        return new Date(ts).toLocaleTimeString([], {
          hour: "2-digit",
          minute: "2-digit",
        });
      }

      function updateInfoText(shown, total, search) {
        const el = document.getElementById("infoText");
        if (search) {
          el.textContent = `Showing ${shown.toLocaleString()} results for "${search}" • Total ${total.toLocaleString()} messages`;
        } else if (shown !== total) {
          el.textContent = `Showing ${shown.toLocaleString()} of ${total.toLocaleString()} messages`;
        } else {
          el.textContent = `${total.toLocaleString()} messages`;
        }
      }

      /* ─────────────────────────────────────────
         FILTERS
      ───────────────────────────────────────── */
      function applyFilters() {
        const start = document.getElementById("startDate").value;
        const end = document.getElementById("endDate").value;
        const search = document
          .getElementById("searchInput")
          .value.toLowerCase()
          .trim();

        const filtered = allMessages.filter((msg) => {
          const msgDate = new Date(msg.timestampUnix * 1000);
          let valid = true;

          if (start) valid = valid && msgDate >= new Date(start + "T00:00:00");
          if (end) valid = valid && msgDate <= new Date(end + "T23:59:59");

          if (search) {
            const haystack = [
              msg.text,
              msg.clipCaption,
              msg.reelOwner,
              msg.type,
            ]
              .filter(Boolean)
              .join(" ")
              .toLowerCase();
            valid = valid && haystack.includes(search);
          }

          return valid;
        });

        updateInfoText(filtered.length, allMessages.length, search);
        renderChunked(filtered, true);
      }

      function resetFilters() {
        document.getElementById("startDate").value = "";
        document.getElementById("endDate").value = "";
        document.getElementById("searchInput").value = "";
        updateInfoText(allMessages.length, allMessages.length, "");
        renderChunked(allMessages, true);
      }

      /* ─────────────────────────────────────────
         REEL CARD — shown for reel_share / clip
      ───────────────────────────────────────── */
      function buildReelCard({ icon, label, caption, owner }) {
        const card = document.createElement("div");
        card.className = "reel-card";

        // Owner
        if (owner) {
          const ownerEl = document.createElement("div");
          ownerEl.className = "reel-owner";
          ownerEl.textContent = "👤 " + owner;
          card.appendChild(ownerEl);
        }

        // Caption preview
        if (caption) {
          const cap = document.createElement("div");
          cap.className = "reel-caption";
          cap.textContent = caption;
          card.appendChild(cap);
        }

        // Header row
        const header = document.createElement("div");
        header.style.cssText = "font-size:13px;font-weight:600;opacity:0.85;";
        header.textContent = icon + " " + label;
        card.appendChild(header);

        // Result container (populated after search)
        const resultSlot = document.createElement("div");
        card.appendChild(resultSlot);

        // "Find Reel" button — only show if there's a caption to search
        const query = (caption || owner || "").trim();
        if (query) {
          const btn = document.createElement("button");
          btn.className = "reel-find-btn";
          btn.innerHTML = `<span class="btn-icon">🔍 Find Reel</span>`;
          btn.onclick = () => findReel(query, btn, resultSlot);
          card.appendChild(btn);
        }

        return card;
      }

      /* ─────────────────────────────────────────
         FIND REEL
         Opens Reels Finder (Google CSE cx=e500c3a7a523b49df)
         with the caption pre-filled via the URL hash.
         The CSE widget reads #gsc.q= to auto-trigger search.
      ───────────────────────────────────────── */
      function findReel(query, btn, slot) {
        // Build the Reels Finder URL with caption as the pre-filled search query.
        // Google CSE widget picks up #gsc.q= and auto-searches on page load.
        const encoded = encodeURIComponent(query);
        const url = `https://reelsfinder.satishyadav.com/#gsc.q=${encoded}&gsc.tab=0`;
        window.open(url, "_blank", "noopener,noreferrer");

        // Show a soft "opened" confirmation under the button
        slot.innerHTML = "";
        const note = document.createElement("div");
        note.className = "reel-not-found";
        note.style.color = "rgba(255,255,255,0.5)";
        note.style.fontStyle = "normal";
        note.textContent = "🔗 Opened Reels Finder — results shown there";
        slot.appendChild(note);

        // Change button to "Search again"
        btn.querySelector(".btn-icon").textContent = "🔍 Search again";
      }

      /* ─────────────────────────────────────────
         KICK OFF
      ───────────────────────────────────────── */
      loadChat();
    </script>
  </body>
</html>
